services:
  - type: web
    name: admit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_HOURS
        value: 24
      - key: CONFIDENCE_THRESHOLD
        value: 0.35
      - key: ALLOWED_ORIGINS
        sync: false
